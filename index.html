<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Item Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK Initialization -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("hgPtjhPCzji2xdRwZ");
        })();
    </script>

    <style>
        :root {
            --primary-orange: #FF6B00;
            --primary-hover: #E05E00;
            --bg-white: #FFFFFF;
            --bg-light: #F9FAFB;
            --text-dark: #1F2937;
            --text-muted: #4B5563;
            --border-color: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .feedback-container {
            background: var(--bg-white);
            max-width: 600px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 8px solid var(--primary-orange);
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 1.75rem;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: var(--bg-light);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-orange);
            background-color: var(--bg-white);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.15);
        }

        /* Star Rating */
        .rating-group {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .rating-group input {
            display: none;
        }

        .rating-group label {
            font-size: 1.75rem;
            color: #D1D5DB;
            cursor: pointer;
            transition: color 0.2s ease;
            margin-bottom: 0;
        }

        .rating-group input:checked ~ label,
        .rating-group label:hover,
        .rating-group label:hover ~ label {
            color: var(--primary-orange);
        }

        /* File Upload */
        .file-dropzone {
            position: relative;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            text-align: center;
            background-color: var(--bg-light);
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .file-dropzone:hover {
            border-color: var(--primary-orange);
        }

        .file-dropzone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-dropzone p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .file-dropzone span {
            color: var(--primary-orange);
            font-weight: 500;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-orange);
            color: var(--bg-white);
            border: none;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-submit:disabled {
            background-color: #D1D5DB;
            cursor: not-allowed;
        }

        /* Modal Notification Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: var(--bg-white);
            padding: 2rem;
            border-radius: 10px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 107, 0, 0.1);
            color: var(--primary-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1rem auto;
        }

        .modal-text {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .modal-btn {
            background: var(--text-dark);
            color: var(--bg-white);
            border: none;
            padding: 0.6rem 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .modal-btn:hover {
            background: #374151;
        }
    </style>
</head>
<body>

<div class="feedback-container">
    <div class="header">
        <h1>Customer Item Feedback</h1>
        <p>Your experience matters to us. Please share your thoughts below.</p>
    </div>

    <form id="feedbackForm">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
        </div>

        <div class="form-group">
            <label for="address">Complete Address</label>
            <input type="text" id="address" name="address" placeholder="123 Street, City, Country" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone/Telephone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
        </div>

        <div class="form-group">
            <label>Star Rating</label>
            <div class="rating-group">
                <input type="radio" id="star5" name="rating" value="5" required><label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
            </div>
        </div>

        <div class="form-group">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Tell us about the item..." required></textarea>
        </div>

        <div class="form-group">
            <label>Photo/Video Upload</label>
            <div class="file-dropzone">
                <input type="file" id="media" name="media" accept="image/*,video/*">
                <p id="file-label">Drag & drop media files here or <span>browse</span></p>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Submit Feedback</button>
    </form>
</div>

<div class="modal-overlay" id="notificationModal">
    <div class="modal-box">
        <div class="modal-icon">✓</div>
        <p class="modal-text">Thank you, your feedback has been recorded.</p>
        <button class="modal-btn" id="modalCloseBtn">Close</button>
    </div>
</div>

<script>
    // Configurations referenced from your Cloudinary settings in image_c8d963.png
    const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dbt9swvcl/upload';
    const CLOUDINARY_PRESET = 'dbt9swvcl'; 

    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const fileInput = document.getElementById('media');
    const fileLabel = document.getElementById('file-label');
    const modal = document.getElementById('notificationModal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // UI Updates for Selected Files
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileLabel.innerHTML = `Selected file: <span>${e.target.files[0].name}</span>`;
        } else {
            fileLabel.innerHTML = `Drag & drop media files here or <span>browse</span>`;
        }
    });

    // Handle Form Submission
    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        // Lock button interaction during upload & email send cycles
        submitBtn.disabled = true;
        submitBtn.innerText = "Processing submission...";

        let uploadedMediaUrl = "No file uploaded";

        // 1. Process Upload to Cloudinary if media file exists
        if (fileInput.files.length > 0) {
            submitBtn.innerText = "Uploading media file...";
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);

            try {
                const response = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    uploadedMediaUrl = data.secure_url;
                }
            } catch (err) {
                console.error("Cloudinary upload error:", err);
                // Graceful degradation: alert user but proceed with text fields
            }
        }

        // 2. Format a professional localized Submission Date/Time
        const currentTimestamp = new Date().toLocaleString('en-US', { 
            dateStyle: 'medium', 
            timeStyle: 'short' 
        });

        // 3. Construct clean EmailJS payload properties matching your HTML Template 
        submitBtn.innerText = "Sending Feedback Email...";
        const selectedRating = document.querySelector('input[name="rating"]:checked')?.value || 'Not Rated';
        
        const templateParams = {
            date: currentTimestamp,
            fullname: document.getElementById('fullname').value,
            address: document.getElementById('address').value,
            phone: document.getElementById('phone').value,
            rating: selectedRating,
            feedback: document.getElementById('feedback').value,
            media_url: uploadedMediaUrl
        };

        emailjs.send("service_1ikpjfl", "template_ks74spe", templateParams)
            .then(function(response) {
                // Display professional popup on success
                modal.classList.add('active');
                form.reset();
                fileLabel.innerHTML = `Drag & drop media files here or <span>browse</span>`;
            }, function(error) {
                alert("Something went wrong with the email delivery service.");
                console.error("EmailJS Error details:", error);
            })
            .finally(function() {
                // Free button state
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Feedback";
            });
    });

    // Close Modal Button Actions
    modalCloseBtn.addEventListener('click', () => {
        modal.classList.remove('active');
    });
</script>
</body>
</html>
